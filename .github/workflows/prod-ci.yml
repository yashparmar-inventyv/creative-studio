name: CI/CD Pipeline

on:
  push:
    # Trigger workflow on these branches
    branches:
      - prod
      - beta
      - dev

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      # 📥 Checkout Project Code
      - name: Checkout Project Code
        uses: actions/checkout@v4

      # 🌍 Set Environment Variables
      - name: Set Environment Variables
        run: |
          # Store branch name (prod, beta, dev)
          echo "ENV_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      # 🔧 Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master
          config-inline: |
            [registry."13.200.24.3"]
              http = true
              insecure = true

      # 🔐 Login to Harbor
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: 13.200.24.3
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # 🏗 Build & Push Image
      - name: Build and Push to Harbor
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            13.200.24.3/creative-studio-app/creative-studio-${{ env.ENV_NAME }}:${{ github.sha }}
            13.200.24.3/creative-studio-app/creative-studio-${{ env.ENV_NAME }}:latest

      # 📥 Checkout GitOps Repo
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      # ✏️ Update Digest in Timoni Values
      - name: Update Digest in Timoni Values
        run: |
          HARBOR_DIGEST="${{ steps.docker_build.outputs.digest }}"
          echo "The Harbor Digest is: $HARBOR_DIGEST"

          cd gitops-repo

          # Dynamic target file
          TARGET_FILE="modules/creative-studio/values-${{ env.ENV_NAME }}.cue"

          # Update digest and clear tag
          sed -i "s|digest:.*|digest: \"$HARBOR_DIGEST\"|g" $TARGET_FILE
          sed -i 's/tag: *".*"/tag: ""/g' $TARGET_FILE

          # Git config
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add $TARGET_FILE

          if git diff --staged --quiet; then
            echo "No changes to commit for $TARGET_FILE"
          else
            git commit -m "chore(${{ env.ENV_NAME }}): update image digest to $HARBOR_DIGEST"
            git push
          fi
