name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: http://13.206.68.218
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push to Harbor
        id: docker_build  # CRITICAL: We need this ID to capture the digest
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # We tag it with github.sha, but we will deploy using the Digest for security
          tags: |
            13.206.68.218/creative-studio-app/creative-studio-app:${{ github.sha }}
            13.206.68.218/creative-studio-app/creative-studio-app:latest

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update Digest in Timoni Values
        run: |
          # Capture the 64-character SHA256 digest from the build step
          HARBOR_DIGEST="${{ steps.docker_build.outputs.digest }}"
          echo "The Harbor Digest is: $HARBOR_DIGEST"

          cd gitops-repo
          
          # 1. Update the digest line with the REAL Harbor SHA
          # 2. Clear the tag line to ensure Timoni uses the Digest
          sed -i "s|digest:.*|digest:  \"$HARBOR_DIGEST\"|g" modules/creative-studio/values-beta.cue
          sed -i 's/tag:  *".*"/tag:  ""/g' modules/creative-studio/values-beta.cue
          
          # Git operations
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add modules/creative-studio/values-beta.cue
          
          # Only push if changes were made
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update image digest to $HARBOR_DIGEST"
            git push
          fi
