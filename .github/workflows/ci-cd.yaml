name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: demo.goharbor.io # Change to your Harbor URL
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push to Harbor
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags the image with the unique GitHub SHA
          tags: |
            demo.goharbor.io/creative-studio-app/creative-studio-app:${{ github.sha }}
            demo.goharbor.io/creative-studio-app/creative-studio-app:latest

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio # Change to your 2nd repo
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update SHA in Timoni Values
        run: |
          cd gitops-repo
          # This search for the 'digest:' line and replaces the sha256 value
          # We use a control character or different delimiter if the SHA contains slashes
          sed -i 's/digest:  *"sha256:[a-zA-Z0-9]*"/digest:  "sha256:${{ github.sha }}"/' modules/creative-studio/values-beta.cue
          
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "chore: update beta digest to ${{ github.sha }}"
          git push
