name: CI/CD Pipeline

on:
  push:
    # This triggers the workflow for any of these three branches
    branches: [ "prod", "beta", "dev" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      - name: Set Environment Variables
        run: |
          # Store the branch name (prod, beta, or dev) to use in tags and file paths
          echo "ENV_NAME=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master
          config-inline: |
            [registry."13.200.24.3"]
              http = true
              insecure = true

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: 13.200.24.3
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push to Harbor
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Tags now include the environment name (e.g., creative-studio-dev)
          tags: |
            13.200.24.3/creative-studio-app/creative-studio-${{ env.ENV_NAME }}:${{ github.sha }}
            13.200.24.3/creative-studio-app/creative-studio-${{ env.ENV_NAME }}:latest

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update Digest in Timoni Values
        run: |
          HARBOR_DIGEST="${{ steps.docker_build.outputs.digest }}"
          echo "The Harbor Digest is: $HARBOR_DIGEST"
          
          cd gitops-repo
          
          # Target file is dynamic: values-prod.cue, values-beta.cue, or values-dev.cue
          TARGET_FILE="modules/creative-studio/values-${{ env.ENV_NAME }}.cue"
          
          # Update the digest and clear the tag for the specific environment
          sed -i "s|digest:.*|digest:  \"$HARBOR_DIGEST\"|g" $TARGET_FILE
          sed -i 's/tag:  *".*"/tag:  ""/g' $TARGET_FILE
          
          # Git operations
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add $TARGET_FILE
          
          if git diff --staged --quiet; then
            echo "No changes to commit for $TARGET_FILE"
          else
            git commit -m "chore(${{ env.ENV_NAME }}): update image digest to $HARBOR_DIGEST"
            git push
          fi