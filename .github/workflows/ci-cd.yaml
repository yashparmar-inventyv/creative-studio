name: CI/CD Pipeline

on:
  push:
    branches: [ "prod", "beta", "dev" ] # Trigger on all three

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      # 1. Set environment variables based on the branch
      - name: Set Environment Variables
        run: |
          if [[ "${{ github.ref_name }}" == "prod" ]]; then
            echo "ENV_NAME=prod" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "beta" ]]; then
            echo "ENV_NAME=beta" >> $GITHUB_ENV
          else
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi

      # ... (Login and Buildx steps remain the same) ...

      - name: Build and Push to Harbor
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Uses the ENV_NAME variable we set above
          tags: |
            13.200.24.3/creative-studio-app/creative-studio-${{ env.ENV_NAME }}:${{ github.sha }}
            13.200.24.3/creative-studio-app/creative-studio-${{ env.ENV_NAME }}:latest

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update Digest in Timoni Values
        run: |
          HARBOR_DIGEST="${{ steps.docker_build.outputs.digest }}"
          cd gitops-repo
          
          # Dynamically target values-prod.cue, values-beta.cue, or values-dev.cue
          TARGET_FILE="modules/creative-studio/values-${{ env.ENV_NAME }}.cue"
          
          sed -i "s|digest:.*|digest:  \"$HARBOR_DIGEST\"|g" $TARGET_FILE
          sed -i 's/tag:  *".*"/tag:  ""/g' $TARGET_FILE
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add $TARGET_FILE
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(${{ env.ENV_NAME }}): update image digest"
            git push
          fi