name: CI/CD Pipeline

on:
  push:
    branches: [ "dev" ]

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          # This tells Buildx to use HTTP instead of HTTPS for your Harbor IP
          driver-opts: image=moby/buildkit:master
          config-inline: |
            [registry."13.200.24.3"]
              http = true
              insecure = true

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: 13.200.24.3
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push to Harbor
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Note: Harbor requires the project 'creative-studio-app' to exist in the UI
          tags: |
            13.200.24.3/creative-studio-app/creative-studio-dev:${{ github.sha }}
            13.200.24.3/creative-studio-app/creative-studio-dev:latest

      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update Digest in Timoni Values
        run: |
          # Capture the 64-character SHA256 digest from the build step
          HARBOR_DIGEST="${{ steps.docker_build.outputs.digest }}"
          echo "The Harbor Digest is: $HARBOR_DIGEST"
          
          cd gitops-repo
          
          # 1. Update the digest line with the REAL Harbor SHA
          # 2. Clear the tag line to ensure Timoni uses the Digest
          sed -i "s|digest:.*|digest:  \"$HARBOR_DIGEST\"|g" modules/creative-studio/values-dev.cue
          sed -i 's/tag:  *".*"/tag:  ""/g' modules/creative-studio/values-dev.cue
          
          # Git operations
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add modules/creative-studio/values-dev.cue
          
          # Only push if changes were made
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update image digest to $HARBOR_DIGEST"
            git push
          fi
