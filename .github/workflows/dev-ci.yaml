name: CI/CD Pipeline

on:
  push:
    branches: [ "prod", "beta", "dev" ]

jobs:
  # --- STAGE 1: Build & Push ---
  build:
    runs-on: self-hosted
    outputs:
      image_digest: ${{ steps.docker_build.outputs.digest }}
    steps:
      - name: Checkout Project Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: image=moby/buildkit:master
          config-inline: |
            [registry."13.200.24.3"]
              http = true
              insecure = true

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: 13.200.24.3
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and Push to Harbor
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            13.200.24.3/creative-studio-app/creative-studio-${{ github.ref_name }}:${{ github.sha }}
            13.200.24.3/creative-studio-app/creative-studio-${{ github.ref_name }}:latest

  # --- STAGE 2: Update GitOps & Deploy ---
  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout GitOps Repo
        uses: actions/checkout@v4
        with:
          repository: yashparmar-inventyv/Timoni-creative-studio
          token: ${{ secrets.GITOPS_REPO_TOKEN }}
          path: gitops-repo

      - name: Update Digest in Timoni Values
        run: |
          # Retrieve digest from the previous build job
          HARBOR_DIGEST="${{ needs.build.outputs.image_digest }}"
          ENV_NAME="${{ github.ref_name }}"
          TARGET_FILE="gitops-repo/modules/creative-studio/values-$ENV_NAME.cue"
          
          echo "Updating $TARGET_FILE with digest: $HARBOR_DIGEST"
          
          cd gitops-repo
          
          # Update the digest and clear the tag
          sed -i "s|digest:.*|digest:  \"$HARBOR_DIGEST\"|g" "modules/creative-studio/values-$ENV_NAME.cue"
          sed -i 's/tag:  *".*"/tag:  ""/g' "modules/creative-studio/values-$ENV_NAME.cue"
          
          # Git operations
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add "modules/creative-studio/values-$ENV_NAME.cue"
          
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore($ENV_NAME): update image digest to $HARBOR_DIGEST"
            git push
          fi
